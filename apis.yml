aid: passbolt
name: Passbolt
description: >-
  Passbolt is an open source password manager for teams. The Passbolt API provides
  programmatic access to manage resources (passwords), folders, users, groups, sharing,
  comments, metadata, and authentication via GPGAuth or JWT.
