    name: Passbolt API
    description: >-
      Low-level reference for the Passbolt API covering authentication, resources,
      folders, users, groups, sharing, comments, metadata keys, and healthcheck. JWT
      is the preferred authentication method; legacy GPGAuth is also supported.
