  parameters:
    containRole:
      name: contain[role]
      description: Add role to response body.
      in: query
      required: false
      schema:
        type: integer
        enum:
        - 1
        - 0
    containMissingMetadataKeyIds:
      name: contain[missing_metadata_key_ids]
      description: Add missing metadata key IDs to response body.
      in: query
      required: false
      schema:
        type: integer
        enum:
        - 1
        - 0
    filterIsActive:
      name: filter[is-active]
      description: Only return active elements.
      in: query
      required: false
      schema:
        type: boolean
    filterHasAccess:
      name: filter[has-access]
      description: Only return elements where specified users have access.
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
          format: uuid
          description: User UUID
    containProfile:
      name: contain[profile]
      description: Add profile to response body.
      in: query
      required: false
      schema:
        type: integer
        enum:
        - 1
        - 0
    containGpgkey:
      name: contain[gpgkey]
      description: Add GPG key data to response body.
      in: query
      required: false
      schema:
        type: integer
        enum:
        - 1
        - 0
    containLastLoggedIn:
      name: contain[last_logged_in]
      description: Add last logged in to response body.
      in: query
      required: false
      schema:
        type: integer
        enum:
        - 1
        - 0
    filterHasGroups:
      name: filter[has-groups]
      description: Only return elements filtered by groups.
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
          format: uuid
          description: Group UUID
    userId:
      name: userId
      description: ID for the user being manipulated. Can be set to `me` when viewing a user.
      in: path
      required: true
      schema:
        type: string
        format: uuid
    containGroupsUsers:
      name: contain[groups_users]
      description: Add group users to groups in response body.
      in: query
      required: false
      schema:
        type: integer
        enum:
        - 1
        - 0
    filterSearch:
      name: filter[search]
      description: Filter using a keyword or a string.
      in: query
      required: false
      schema:
        type: string
    filterIsAdmin:
      name: filter[is-admin]
      description: Only return admin users.
      in: query
      required: false
      schema:
        type: boolean
  requestBodies:
    userUpdate:
      description: The user you want to update
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/userUpdate'
          examples:
            base:
              value:
                profile:
                  first_name: Freddie
                  last_name: Mercury
    userAdd:
      description: The user you want to create
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/userAdd'
          examples:
            base:
              value:
                username: ada@passbolt.com
                profile:
                  first_name: Ada
                  last_name: Lovelace
  securitySchemes:
    bearerHttpAuthentication:
      description: Bearer token using a JWT
      type: http
      scheme: Bearer
      bearerFormat: JWT
    gpgCookieAuthentication:
      description: Session-based authentication. Note that a CSRF token needs to be provided through a header named `X-CSRF-Token`.
      type: apiKey
      in: cookie
      name: passbolt_session
