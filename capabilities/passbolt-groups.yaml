    resources:
    - name: groups.json
      path: /groups.json
      operations:
      - name: indexgroups
        method: GET
        description: Get multiple groups.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: addgroup
        method: POST
        description: Create a group.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: groups-groupId}.json
      path: /groups/{groupId}.json
      operations:
      - name: viewgroup
        method: GET
        description: Get a group.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updategroup
