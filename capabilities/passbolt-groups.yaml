    namespace: passbolt-groups-rest
    port: 8080
    description: REST adapter for Passbolt API — Groups. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/groups-json
      name: groups-json
      description: REST surface for groups.json.
      operations:
      - method: GET
        name: indexgroups
        description: Get multiple groups.
        call: passbolt-groups.indexgroups
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addgroup
        description: Create a group.
        call: passbolt-groups.addgroup
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/groups/groupid-json
      name: groups-groupid-json
      description: REST surface for groups-groupId}.json.
      operations:
      - method: GET
        name: viewgroup
        description: Get a group.
        call: passbolt-groups.viewgroup
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updategroup
