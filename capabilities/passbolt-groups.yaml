          required: false
      - name: dryrundeletegroup
        method: DELETE
        description: Dry run a group deletion.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.PASSBOLT_API_KEY}}'
  exposes:
