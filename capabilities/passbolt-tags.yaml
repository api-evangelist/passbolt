naftiko: 1.0.0-alpha2
info:
  label: Passbolt API — Tags
  description: 'Passbolt API — Tags. 3 operations. Lead operation: Get personal tags and shared tags.. Self-contained Naftiko
    capability covering one Passbolt business surface.'
  tags:
  - Passbolt
  - Tags
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PASSBOLT_API_KEY: PASSBOLT_API_KEY
capability:
  consumes:
  - type: http
    namespace: passbolt-tags
    baseUri: https://passbolt.local
    description: Passbolt API — Tags business capability. Self-contained, no shared references.
    resources:
    - name: tags.json
      path: /tags.json
      operations:
      - name: indextags
        method: GET
        description: Get personal tags and shared tags.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tags-resourceOrTagId}.json
      path: /tags/{resourceOrTagId}.json
      operations:
      - name: updatetag
        method: PUT
        description: Update a tag.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: addtagsresource
        method: POST
        description: Add tags to a resource.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.PASSBOLT_API_KEY}}'
  exposes:
  - type: rest
    namespace: passbolt-tags-rest
    port: 8080
    description: REST adapter for Passbolt API — Tags. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/tags-json
      name: tags-json
      description: REST surface for tags.json.
      operations:
      - method: GET
        name: indextags
        description: Get personal tags and shared tags.
        call: passbolt-tags.indextags
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tags/resourceortagid-json
      name: tags-resourceortagid-json
      description: REST surface for tags-resourceOrTagId}.json.
      operations:
      - method: PUT
        name: updatetag
        description: Update a tag.
        call: passbolt-tags.updatetag
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addtagsresource
        description: Add tags to a resource.
        call: passbolt-tags.addtagsresource
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: passbolt-tags-mcp
    port: 9090
    transport: http
    description: MCP adapter for Passbolt API — Tags. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-personal-tags-and-shared
      description: Get personal tags and shared tags.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: passbolt-tags.indextags
      outputParameters:
      - type: object
        mapping: $.
    - name: update-tag
      description: Update a tag.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: passbolt-tags.updatetag
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: add-tags-resource
      description: Add tags to a resource.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: passbolt-tags.addtagsresource
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
