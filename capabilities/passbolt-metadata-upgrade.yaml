      name: metadata-upgrade-folders-json
      description: REST surface for metadata-upgrade-folders.json.
      operations:
      - method: GET
        name: viewmetadataupgradefolders
        description: Get Upgradable Folders
        call: passbolt-metadata-upgrade.viewmetadataupgradefolders
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: upgrademetadatafolders
        description: Upgrade a folder
        call: passbolt-metadata-upgrade.upgrademetadatafolders
