      type: bearer
      token: '{{env.PASSBOLT_API_KEY}}'
  exposes:
  - type: rest
    namespace: passbolt-resource-types-rest
    port: 8080
    description: REST adapter for Passbolt API — Resource types. One Spectral-compliant resource per consumed operation, prefixed
