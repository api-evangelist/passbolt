naftiko: 1.0.0-alpha2
info:
  label: Passbolt API — Roles
  description: 'Passbolt API — Roles. 1 operations. Lead operation: Get multiple roles.. Self-contained Naftiko capability
    covering one Passbolt business surface.'
  tags:
  - Passbolt
  - Roles
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PASSBOLT_API_KEY: PASSBOLT_API_KEY
capability:
  consumes:
  - type: http
    namespace: passbolt-roles
    baseUri: https://passbolt.local
    description: Passbolt API — Roles business capability. Self-contained, no shared references.
    resources:
    - name: roles.json
      path: /roles.json
      operations:
      - name: indexroles
        method: GET
        description: Get multiple roles.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.PASSBOLT_API_KEY}}'
  exposes:
  - type: rest
    namespace: passbolt-roles-rest
    port: 8080
    description: REST adapter for Passbolt API — Roles. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/roles-json
      name: roles-json
      description: REST surface for roles.json.
      operations:
      - method: GET
        name: indexroles
        description: Get multiple roles.
        call: passbolt-roles.indexroles
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: passbolt-roles-mcp
    port: 9090
    transport: http
    description: MCP adapter for Passbolt API — Roles. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-multiple-roles
      description: Get multiple roles.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: passbolt-roles.indexroles
      outputParameters:
      - type: object
        mapping: $.
