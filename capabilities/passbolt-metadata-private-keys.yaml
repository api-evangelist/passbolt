naftiko: 1.0.0-alpha2
info:
  label: Passbolt API — Metadata private keys
  description: 'Passbolt API — Metadata private keys. 2 operations. Lead operation: Update a metadata private key.. Self-contained
    Naftiko capability covering one Passbolt business surface.'
  tags:
  - Passbolt
  - Metadata private keys
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PASSBOLT_API_KEY: PASSBOLT_API_KEY
capability:
  consumes:
  - type: http
    namespace: passbolt-metadata-private-keys
    baseUri: https://passbolt.local
    description: Passbolt API — Metadata private keys business capability. Self-contained, no shared references.
    resources:
    - name: metadata-keys-private-metadataPrivateKeyId}.json
      path: /metadata/keys/private/{metadataPrivateKeyId}.json
      operations:
      - name: updatemetadataprivatekey
        method: PUT
        description: Update a metadata private key.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: metadata-keys-privates.json
      path: /metadata/keys/privates.json
      operations:
      - name: addmetadataprivatekey
        method: POST
        description: Create a metadata private key.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.PASSBOLT_API_KEY}}'
  exposes:
  - type: rest
    namespace: passbolt-metadata-private-keys-rest
    port: 8080
    description: REST adapter for Passbolt API — Metadata private keys. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/metadata/keys/private/metadataprivatekeyid-json
      name: metadata-keys-private-metadataprivatekeyid-json
      description: REST surface for metadata-keys-private-metadataPrivateKeyId}.json.
      operations:
      - method: PUT
        name: updatemetadataprivatekey
        description: Update a metadata private key.
        call: passbolt-metadata-private-keys.updatemetadataprivatekey
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/metadata/keys/privates-json
      name: metadata-keys-privates-json
      description: REST surface for metadata-keys-privates.json.
      operations:
      - method: POST
        name: addmetadataprivatekey
        description: Create a metadata private key.
        call: passbolt-metadata-private-keys.addmetadataprivatekey
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: passbolt-metadata-private-keys-mcp
    port: 9090
    transport: http
    description: MCP adapter for Passbolt API — Metadata private keys. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: update-metadata-private-key
      description: Update a metadata private key.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: passbolt-metadata-private-keys.updatemetadataprivatekey
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: create-metadata-private-key
      description: Create a metadata private key.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: passbolt-metadata-private-keys.addmetadataprivatekey
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
