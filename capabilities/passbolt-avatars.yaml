naftiko: 1.0.0-alpha2
info:
  label: Passbolt API — Avatars
  description: 'Passbolt API — Avatars. 1 operations. Lead operation: Get an avatar as an image.. Self-contained Naftiko capability
    covering one Passbolt business surface.'
  tags:
  - Passbolt
  - Avatars
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PASSBOLT_API_KEY: PASSBOLT_API_KEY
capability:
  consumes:
  - type: http
    namespace: passbolt-avatars
    baseUri: https://passbolt.local
    description: Passbolt API — Avatars business capability. Self-contained, no shared references.
    resources:
    - name: avatars-view-avatarId-avatarFormat
      path: /avatars/view/{avatarId}/{avatarFormat}
      operations:
      - name: viewavatar
        method: GET
        description: Get an avatar as an image.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.PASSBOLT_API_KEY}}'
  exposes:
  - type: rest
    namespace: passbolt-avatars-rest
    port: 8080
    description: REST adapter for Passbolt API — Avatars. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/avatars/view/{avatarid}/{avatarformat}
      name: avatars-view-avatarid-avatarformat
      description: REST surface for avatars-view-avatarId-avatarFormat.
      operations:
      - method: GET
        name: viewavatar
        description: Get an avatar as an image.
        call: passbolt-avatars.viewavatar
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: passbolt-avatars-mcp
    port: 9090
    transport: http
    description: MCP adapter for Passbolt API — Avatars. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-avatar-image
      description: Get an avatar as an image.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: passbolt-avatars.viewavatar
      outputParameters:
      - type: object
        mapping: $.
