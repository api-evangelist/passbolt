        destructive: false
        idempotent: false
      call: passbolt-users.adduser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-user
      description: Get a user.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: passbolt-users.viewuser
      outputParameters:
      - type: object
        mapping: $.
    - name: update-user
      description: Update a user.
      hints:
