    description: Passbolt API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users.json
      path: /users.json
      operations:
      - name: indexusers
        method: GET
        description: Get multiple users.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: adduser
        method: POST
        description: Create a user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: users-userId}.json
      path: /users/{userId}.json
      operations:
      - name: viewuser
        method: GET
        description: Get a user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateuser
        method: PUT
        description: Update a user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteuser
