        description: Delete a user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-userId-dry-run.json
      path: /users/{userId}/dry-run.json
      operations:
      - name: dryrundeleteuser
        method: DELETE
        description: Dry run a user deletion.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.PASSBOLT_API_KEY}}'
  exposes:
  - type: rest
    namespace: passbolt-users-rest
    port: 8080
    description: REST adapter for Passbolt API — Users. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/users-json
      name: users-json
      description: REST surface for users.json.
      operations:
      - method: GET
        name: indexusers
        description: Get multiple users.
        call: passbolt-users.indexusers
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: adduser
        description: Create a user.
        call: passbolt-users.adduser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/userid-json
      name: users-userid-json
      description: REST surface for users-userId}.json.
      operations:
      - method: GET
        name: viewuser
        description: Get a user.
        call: passbolt-users.viewuser
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateuser
        description: Update a user.
        call: passbolt-users.updateuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteuser
        description: Delete a user.
        call: passbolt-users.deleteuser
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{userid}/dry-run-json
